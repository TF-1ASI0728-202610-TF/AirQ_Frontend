spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://broker.hivemq.com:1883}
    client-id: airq-prod-backend
    default-topic: airq/cloud/telemetry

  brevo:
    api:
      url: ${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
      key: ${BREVO_API_KEY}
      sender: ${BREVO_SENDER:noreply.oxaira@gmail.com}

  admin:
    default:
      email: ${ADMIN_DEFAULT_EMAIL}
      password: ${ADMIN_DEFAULT_PASSWORD}

ml:
  api:
    url: ${ML_API_URL:https://ml-iotprueba.onrender.com/predict}

cors:
  allowed:
    origins: ${ALLOWED_CORS_ORIGINS:*}
