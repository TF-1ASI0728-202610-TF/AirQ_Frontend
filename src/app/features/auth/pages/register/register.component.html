<section class="auth-container">
  <div class="auth-card">
    <h1>Crear Cuenta</h1>
    <p>Complete los datos para registrarse.</p>

    <form [formGroup]="form" (ngSubmit)="register()">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" formControlName="fullName" placeholder="Nombre completo">
      </div>

      <div class="form-group">
        <label>Empresa</label>
        <input type="text" formControlName="companyName" placeholder="Empresa">
      </div>

      <div class="form-group">
        <label>Correo</label>
        <input type="email" formControlName="email" placeholder="Correo">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="Contraseña">
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" formControlName="confirmPassword" placeholder="Confirmar contraseña">
      </div>

      <button type="submit" class="btn-primary">Crear Cuenta</button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Volver al login</a>
    </div>
  </div>
</section>
